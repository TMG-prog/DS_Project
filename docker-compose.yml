version: "3.9"

services:
  load_balancer:
    build: ./load_balancer
    image: load-balancer-image
    container_name: load_balancer
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    networks:
      net1:
        aliases:
          - lb

networks:
  net1:
    name: net1